name: Update Organization Profile

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at midnight
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Update Organization Profile
        env:
          GH_TOKEN: ${{ secrets.GITFLOW_TOKEN }}
          ORG_NAME: "assforge"
          ORG_EMOJI: "⚒️"
          ORG_TITLE: "Forge Tools"
          ORG_SUBTITLE: "Agent Framework & Development Tools"
          SECTION_TITLE: "Forge Packages"
        run: |
          mkdir -p profile

          cat > profile/README.md << PROFILE
          # ${ORG_EMOJI} ${ORG_NAME}

          **${ORG_TITLE}** - ${ORG_SUBTITLE}

          ## ${SECTION_TITLE}

          | Repository | Description |
          |------------|-------------|
          PROFILE

          gh repo list "${ORG_NAME}" --no-archived --json name,description,url \
            --jq 'sort_by(.name) | .[] | select(.name != ".github") | "| [\(.name)](\(.url)) | \(.description // "—") |"' \
            >> profile/README.md

          cat >> profile/README.md << 'FOOTER'

          ---
          *Part of [Microsb Platform](https://microsb.net) · Auto-generated*
          FOOTER

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/README.md
          git diff --staged --quiet || git commit -m "chore: update repo index"
          git push
